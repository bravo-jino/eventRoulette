<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>룰렛 이벤트</title>
    <link rel="stylesheet" href="css/style.css?v=20260630-2" />
  </head>
  <body class="event-access-required">
    <main class="page event-page">
      <a class="admin-link admin-link-fixed" href="admin.html">관리자 설정</a>
      <header class="hero">
        <div id="title-image-slot" class="title-image-slot" hidden>
          <img id="title-image" alt="이벤트 이미지" />
        </div>
        <div class="title-copy">
          <h1 id="event-title">룰렛 이벤트</h1>
          <p class="subtitle">버튼을 눌러 행운의 결과를 확인하세요.</p>
        </div>
      </header>

      <section class="wheel-wrap" aria-live="polite">
        <div class="pointer" aria-hidden="true"></div>
        <canvas id="wheel" width="720" height="720" aria-label="룰렛"></canvas>
      </section>

      <div class="actions">
        <button id="spin" type="button">룰렛 돌리기</button>
      </div>

      <p id="result" class="result" role="status"></p>
    </main>

    <script src="js/remote-config.js"></script>
    <script src="js/entry-auth.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js?v=20260630-2"></script>
  </body>
</html>
